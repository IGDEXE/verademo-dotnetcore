#
# This is an example of using the VeraDemo DotNetCore test application with the Veracode scanners.  
#

# A Veracode subscription is required.
trigger:
- none

pool:
  vmImage: 'ubuntu-20.04'

stages:
- stage: Build
  jobs:
  - job: doBuild
    steps:

    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '3.1.x'

    - task: DotNetCoreCLI@2
      inputs:
        command: 'publish'
        arguments: '-c Debug -p:UseAppHost=false'
        workingDirectory: '$(Build.SourcesDirectory)/app'

    - script: |
        SOURCE_PATH="$(pwd)"
        DESTINATION_PATH="$(caminhoPacote)"
        STAGING_DIR="$(mktemp -d)"

        echo "SOURCE_PATH=$SOURCE_PATH"
        echo "STAGING_DIR=$STAGING_DIR"

        echo "Localizando assemblies compilados válidos..."

        find "$SOURCE_PATH" -type f -name "*.dll" \
          ! -iname "*Microsoft*" \
          ! -iname "*UnitTest*" \
          ! -iname "*Xunit*" \
          ! -iname "*Test*" \
          ! -path "*/obj/*" \
          ! -path "*/ref/*" \
          ! -path "*/refint/*" \
          | while read -r dllFile; do

              pdbFile="${dllFile%.dll}.pdb"

              if [[ -f "$pdbFile" ]]; then

                relativeDir="$(dirname "${dllFile#$SOURCE_PATH/}")"

                mkdir -p "$STAGING_DIR/$relativeDir"

                cp "$dllFile" "$STAGING_DIR/$relativeDir/"
                cp "$pdbFile" "$STAGING_DIR/$relativeDir/"

                echo "Assemblies adicionados:"
                echo "  ${dllFile#$SOURCE_PATH/}"
                echo "  ${pdbFile#$SOURCE_PATH/}"

                for ext in deps.json runtimeconfig.json; do
                  auxFile="${dllFile%.dll}.${ext}"

                  if [[ -f "$auxFile" ]]; then
                    cp "$auxFile" "$STAGING_DIR/$relativeDir/"

                    echo "  ${auxFile#$SOURCE_PATH/}"
                  fi
                done

                webConfig="$(dirname "$dllFile")/web.config"

                if [[ -f "$webConfig" ]]; then
                  cp "$webConfig" "$STAGING_DIR/$relativeDir/"

                  echo "  ${webConfig#$SOURCE_PATH/}"
                fi
              fi
            done

        echo "Gerando ZIP Veracode..."

        cd "$STAGING_DIR"

        zip -r "$SOURCE_PATH/$DESTINATION_PATH" . \
          -x '*/node_modules/*' \
             '*/.git/*' \
             '*/obj/*' \
             '*/ref/*' \
             '*/refint/*' \
             '*/TestResults/*'

        echo "ZIP criado com sucesso:"
        echo "$SOURCE_PATH/$DESTINATION_PATH"

        echo "Conteúdo final do pacote:"
        unzip -l "$SOURCE_PATH/$DESTINATION_PATH"
      displayName: 'Preparar pacote Veracode'

    - script: |
        LATEST_VERSION=$(curl -s https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
        curl -L -o veracode-wrapper.jar "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${LATEST_VERSION}/vosp-api-wrappers-java-${LATEST_VERSION}.jar"
      displayName: 'Download Veracode Wrapper'

    - script: |
        if [ $(Build.SourceBranchName) == 'main' ]; then
          java -jar veracode-wrapper.jar -vid $(VERACODE_API_KEY_ID) -vkey $(VERACODE_API_KEY_SECRET) -action uploadandscan -appname "$(Build.DefinitionName)" -createprofile true -version $(build.buildNumber) -filepath $(caminhoPacote) -teams "$(veracodeTeams)" -deleteincompletescan 2
        else
          java -jar veracode-wrapper.jar -vid $(VERACODE_API_KEY_ID) -vkey $(VERACODE_API_KEY_SECRET) -action uploadandscan -appname "$(Build.DefinitionName)" -createprofile true -version $(build.buildNumber) -filepath $(caminhoPacote) -teams "$(veracodeTeams)" -createsandbox true -sandboxname "$(Build.SourceBranchName)" -deleteincompletescan 2
        fi
      displayName: 'Veracode U&S'
      continueOnError: true

    - script: |
        curl -fsS https://tools.veracode.com/veracode-cli/install | sh
      displayName: 'Download Veracode CLI'

    - script: |
        curl -sSL https://download.srcclr.com/ci.sh | bash -s -- scan --update-advisor --allow-dirty --recursive
      displayName: 'Veracode SCA'
      continueOnError: true

    - script: |
        ORIGINAL_DIR=$(pwd)
        PARENT_DIR=$(dirname "$ORIGINAL_DIR")
        ORIGINAL_NAME=$(basename "$ORIGINAL_DIR")
        PIPELINE_DIR="$(Build.DefinitionName)"

        cd "$PARENT_DIR"
        mv "$ORIGINAL_NAME" "$PIPELINE_DIR"

        cd "$PIPELINE_DIR"

        echo "pasta:$(pwd)"

        ./veracode scan --type directory --source "$(pwd)" --format table

        cd "$PARENT_DIR"

        mv "$PIPELINE_DIR" "$ORIGINAL_NAME"

        cd "$ORIGINAL_DIR"
      displayName: 'Veracode IaC'
      continueOnError: true

    - script: |
        ./veracode static scan "$(caminhoPacote)"
      displayName: 'Veracode SAST'
      continueOnError: true
